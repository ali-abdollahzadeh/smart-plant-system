services:
  catalogue:
    build: ./catalogue
    container_name: catalogue
    ports:
      - "8000:8000"
    volumes:
      - ./catalogue/data:/app/data
    environment:
      CATALOG_HOST: 0.0.0.0
      CATALOG_PORT: 8000
      CATALOG_FILE: /app/data/catalog.json
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    restart: unless-stopped

  thingspeak-adapter:
    build: ./thingspeak_adapter
    container_name: thingspeak-adapter
    volumes:
      - ./thingspeak_adapter/data:/app/data
    env_file:
      - .env
    environment:
      CONFIG_FILE: /app/config.json
      REGISTRY_FILE: /app/data/channel_registry.json
    depends_on:
      - mosquitto
      - catalogue
    restart: unless-stopped
  analytics:
    build: ./analytics
    container_name: analytics
    env_file:
      - .env
    environment:
      SERVICE_ID: analytics
      SERVICE_NAME: Analytics Service
      SERVICE_TYPE: analytics
      SERVICE_HOST: 0.0.0.0
      SERVICE_PORT: 8090
      CONFIG_FILE: /app/config.json
      CATALOG_URL: http://catalogue:8000
      REGISTER_INTERVAL: 60
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
    ports:
      - "8090:8090"
    depends_on:
      - catalogue
      - mosquitto
    restart: unless-stopped
  alert-generator:
    build: ./alert_generator
    container_name: alert-generator
    env_file:
      - .env
    environment:
      SERVICE_ID: alert-generator
      SERVICE_NAME: Alert Generator
      SERVICE_TYPE: alert_generator
      SERVICE_HOST: 0.0.0.0
      SERVICE_PORT: 8091
      CONFIG_FILE: /app/config.json
      CATALOG_URL: http://catalogue:8000
      REGISTER_INTERVAL: 60
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      THINGSPEAK_ADAPTER_URL: http://thingspeak-adapter:8080
    ports:
      - "8091:8091"
    depends_on:
      - catalogue
      - mosquitto
      - thingspeak-adapter
    restart: unless-stopped

  telegram-bot:
    build: ./telegram_bot
    container_name: telegram-bot
    env_file:
      - .env
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      CATALOG_URL: http://catalogue:8000
      ALERT_GENERATOR_URL: http://alert-generator:8091
      ANALYTICS_URL: http://analytics:8090
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      MQTT_ALERT_TOPIC: smartplant/alerts/#
      MQTT_COMMAND_TOPIC_BASE: smartplant/commands
      SERVICE_ID: telegram-bot
      SERVICE_NAME: Telegram Bot
      SERVICE_TYPE: telegram_bot
      REGISTER_INTERVAL: 60
      CONFIG_FILE: /app/config.json
      AUTH_FILE: /app/auth.json
    depends_on:
      - catalogue
      - alert-generator
      - analytics
      - mosquitto
    restart: unless-stopped

  nodered:
    build: ./nodered
    container_name: nodered
    ports:
      - "1880:1880"
    volumes:
      - ./nodered/data:/data
    depends_on:
      - catalogue
      - mosquitto
    restart: unless-stopped
  
  raspi-01:
    build: ./raspberry-pi
    container_name: raspi-01
    env_file:
      - .env
    environment:
      DEVICE_ID: raspi-01
      DEVICE_NAME: Plant Sensor Node 1
      DEVICE_TYPE: sensor_node
      CATALOG_URL: http://catalogue:8000
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      MQTT_TOPIC_BASE: smartplant/sensors
      MQTT_COMMAND_TOPIC_BASE: smartplant/commands
      PUBLISH_INTERVAL: 10
      REGISTER_INTERVAL: 60
    depends_on:
      - catalogue
      - mosquitto
    restart: unless-stopped

  raspi-02:
    build: ./raspberry-pi
    container_name: raspi-02
    env_file:
      - .env
    environment:
      DEVICE_ID: raspi-02
      DEVICE_NAME: Plant Sensor Node 2
      DEVICE_TYPE: sensor_node
      CATALOG_URL: http://catalogue:8000
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      MQTT_TOPIC_BASE: smartplant/sensors
      MQTT_COMMAND_TOPIC_BASE: smartplant/commands
      PUBLISH_INTERVAL: 10
      REGISTER_INTERVAL: 60
    depends_on:
      - catalogue
      - mosquitto
    restart: unless-stopped

  raspi-03:
    build: ./raspberry-pi
    container_name: raspi-03
    env_file:
      - .env
    environment:
      DEVICE_ID: raspi-03
      DEVICE_NAME: Plant Sensor Node 3
      DEVICE_TYPE: sensor_node
      CATALOG_URL: http://catalogue:8000
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      MQTT_TOPIC_BASE: smartplant/sensors
      MQTT_COMMAND_TOPIC_BASE: smartplant/commands
      PUBLISH_INTERVAL: 10
      REGISTER_INTERVAL: 60
    depends_on:
      - catalogue
      - mosquitto
    restart: unless-stopped

  raspi-04:
    build: ./raspberry-pi
    container_name: raspi-04
    env_file:
      - .env
    environment:
      DEVICE_ID: raspi-04
      DEVICE_NAME: Plant Sensor Node 4
      DEVICE_TYPE: sensor_node
      CATALOG_URL: http://catalogue:8000
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      MQTT_TOPIC_BASE: smartplant/sensors
      MQTT_COMMAND_TOPIC_BASE: smartplant/commands
      PUBLISH_INTERVAL: 10
      REGISTER_INTERVAL: 60
    depends_on:
